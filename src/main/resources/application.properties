# ─────────────────────────────────────────────────────────────────────
# Configuration. Secrets MUST come from environment variables — there
# are no inline defaults for sensitive values, so the app fails loudly
# at startup if you forgot to set one.
#
# Local dev setup:
#   1. Copy dev-env.example.ps1 → dev-env.ps1 (gitignored) and fill in
#      your values.
#   2. Dot-source it in PowerShell:    . .\dev-env.ps1
#   3. Then:                            .\mvnw.cmd spring-boot:run
#
# Production: set the same env vars in your host's environment (Railway,
# Render, Cloudflare Workers, systemd unit, etc).
# ─────────────────────────────────────────────────────────────────────

server.port=${SERVER_PORT:8081}

# ── Database ─────────────────────────────────────────────────────────
# DB_URL falls back to a local dev MySQL. DB_USER falls back to root.
# DB_PASSWORD has NO default — it must be set or startup fails.
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/corn}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.show-sql=${JPA_SHOW_SQL:true}
spring.jpa.generate-ddl=true
spring.jpa.hibernate.ddl.auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# ── Logging ──────────────────────────────────────────────────────────
logging.level.root=warn
logging.level.org.springframework.web=debug
logging.level.org.hibernate=error

# ── Third-party API keys ─────────────────────────────────────────────
# USDA NASS Quick Stats — get a key at https://quickstats.nass.usda.gov/api
usda.api.key=${USDA_API_KEY}
